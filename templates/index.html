<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonko Art</title>
    <link rel="icon" type="image/png" href="/static/images/diablo_3_sin_fondo_negro.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="password-access">
            <a href="#" onclick="showPasswordPrompt()">ENTER USING PASSWORD</a>
        </div>
        <img src="/static/images/web-nombre-anim.gif" alt="Logo" class="logo-main">
    </header>

    <div class="main-container">
        <img src="/static/images/web-diablo-anim.gif" class="diablo-bg" alt="Fondo">

        <div class="content-box">
            <h2>GET YOUR EARLY ACCESS</h2>
            
            <div class="email-section">
                <form id="emailForm">
                    <input type="email" name="email" placeholder="YOUR E-MAIL HERE..." required>
                    <button type="submit">SUBSCRIBE</button>
                </form>
                <p id="responseMessage"></p>
            </div>
            
            <p class="copyright-text">Yonko Art ©2024</p>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePasswordPrompt()">&times;</span>
            <h3>ACCESO EXCLUSIVO</h3>
            <input type="password" id="passInput" placeholder="CONTRASEÑA">
            <button onclick="checkPassword()" class="btn-enter">ENTRAR</button>
            <p id="passError" style="color:red; display:none; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <footer class="footer">
        <a href="{{ links.youtube }}" target="_blank"><img src="/static/images/Capa13.png" alt="YT"></a>
        <a href="{{ links.spotify }}" target="_blank"><img src="/static/images/Capa15.png" alt="SP"></a>
        <a href="{{ links.instagram }}" target="_blank"><img src="/static/images/Capa20.png" alt="IG"></a>
    </footer>

    <script>
        // Lógica para el formulario de email
        const form = document.getElementById('emailForm');
        const msg = document.getElementById('responseMessage');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const response = await fetch('/registrar_email', { method: 'POST', body: formData });
            const result = await response.json();
            msg.style.display = 'block';
            msg.innerText = result.message.toUpperCase();
            if (result.status === 'éxito') { form.reset(); msg.style.color = '#000'; }
        };

        // Lógica para el Modal de Contraseña
        function showPasswordPrompt() { document.getElementById('passwordModal').style.display = 'flex'; }
        function closePasswordPrompt() { document.getElementById('passwordModal').style.display = 'none'; }

        async function checkPassword() {
            const pass = document.getElementById('passInput').value;
            const formData = new URLSearchParams();
            formData.append('password', pass);

            const response = await fetch('/login', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                window.location.href = '/drop';
            } else {
                const result = await response.json();
                const err = document.getElementById('passError');
                err.innerText = result.message;
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
