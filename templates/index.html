<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de prueba para el diseño de Yonko">
  <title>Yonko Web</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <!-- Cabecera -->
  <div class="header">
    <img src="/static/images/web-nombre-anim.gif" alt="Animación del nombre">
  </div>

  <!-- Contenido central -->
  <div class="main-container">
    <!-- Personaje -->
    <div class="left-column">
      <img class="diablo-gif" src="/static/images/web-diablo-anim.gif" alt="Personaje animado">
    </div>

    <!-- Botones -->
    <div class="right-column">
      <!-- Botón Animation -->
      <div class="button">
        <a href="/animation">
          <img src="/static/images/yonkonews.png" alt="Botón Animation">
          <img class="hover-img" src="/static/images/yonkonews2.png" alt="Botón Animation Hover">
        </a>
      </div>

      <!-- Botón Storyboard -->
      <div class="button">
        <a href="/storyboard">
          <img src="/static/images/webYonkoshitOption.png" alt="Botón Storyboard">
          <img class="hover-img" src="/static/images/webYonkoshitOption2.png" alt="Botón Storyboard Hover">
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://www.youtube.com/@yonkoalter/featured" target="_blank">
      <img src="/static/images/Capa13.png" alt="YouTube">
    </a>
    <a href="#" target="_blank">
      <img src="/static/images/Capa15.png" alt="Spotify">
    </a>
  </div>
</body>
</html>
