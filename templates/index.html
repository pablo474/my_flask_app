<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonko</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Título en la parte superior -->
    <div class="header">
        <iframe src="/static/web-nombre-anim.html" class="title-animation" scrolling="no"></iframe>
    </div>

    <!-- Contenido principal: botones y personaje -->
    <div class="main-content">
        <div class="buttons-section">
            <div class="button">
                <a href="#">
                    <img src="/static/yonkonews.png" class="default" alt="Animation">
                    <img src="/static/yonkonews2.png" class="hover" alt="Animation Hover">
                </a>
            </div>
            <div class="button">
                <a href="#">
                    <img src="/static/webYonkoshitOption.png" class="default" alt="Storyboard">
                    <img src="/static/webYonkoshitOption2.png" class="hover" alt="Storyboard Hover">
                </a>
            </div>
        </div>
        <div class="character-section">
            <iframe src="/static/web-diablo-anim.html" class="character-animation" scrolling="no"></iframe>
        </div>
    </div>

    <!-- Enlaces inferiores -->
    <div class="footer">
        <a href="https://www.youtube.com/@yonkoalter/featured" target="_blank">
            <img src="/static/Capa13.png" alt="YouTube">
        </a>
        <a href="#" target="_blank">
            <img src="/static/Capa15.png" alt="Spotify">
        </a>
    </div>
</body>
</html>
