<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de prueba para el diseño de Yonko">
  <title>Yonko Web</title>
  <link rel="icon" type="image/png" href="/static/images/diablo_3_sin_fondo_negro.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <img src="/static/images/web-nombre-anim.gif" alt="Animación del nombre">
  </header>

  <!-- Main Content -->
  <div class="main-container">
    <!-- Left Column: Diablo -->
    <div class="left-column">
      <img class="diablo-gif" src="/static/images/web-diablo-anim.gif" alt="Diablo Animado">
    </div>

    <!-- Center Column: Buttons -->
    <div class="center-column">
      <!-- Botón Storyboard -->
      <div class="button">
        <a href="/storyboard">
          <img src="/static/images/Capa13.png" alt="Botón Storyboard">
        </a>
      </div>

      <!-- Botón Animation -->
      <div class="button">
        <a href="#" id="yonkonews-btn">
          <img src="/static/images/yonkonews.png" alt="Botón Animation">
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://www.youtube.com/@yonkoalter/featured" target="_blank">
      <img src="/static/images/Capa13.png" alt="YouTube">
    </a>
    <a href="#" target="_blank">
      <img src="/static/images/Capa15.png" alt="Spotify">
    </a>
    <a href="https://www.instagram.com" target="_blank">
      <img src="/static/images/Capa20.png" alt="Instagram">
    </a>
  </div>

  <!-- Modal -->
  <div id="yonkonews-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="close-modal">&times;</span>
      <img src="/static/images/yonkonews3.png" alt="Formulario Yonkonews">
      <form id="yonkonews-form">
        <label for="email">Correo Electrónico (obligatorio):</label>
        <input type="email" id="email" name="email" required>
        <label for="name">Nombre (obligatorio):</label>
        <input type="text" id="name" name="name" required>
        <label for="favorite-art">Arte Favorito (opcional):</label>
        <input type="text" id="favorite-art" name="favorite-art">
        <button type="submit">Enviar</button>
      </form>
    </div>
  </div>

  <script>
    // Mostrar modal al hacer clic en Yonkonews
    document.getElementById('yonkonews-btn').addEventListener('click', function (e) {
      e.preventDefault();
      document.getElementById('yonkonews-modal').style.display = 'block';
    });

    // Cerrar modal
    document.getElementById('close-modal').addEventListener('click', function () {
      document.getElementById('yonkonews-modal').style.display = 'none';
    });

    // Enviar formulario (puedes actualizar esto con AJAX si tienes un backend)
    document.getElementById('yonkonews-form').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Formulario enviado con éxito.');
      document.getElementById('yonkonews-modal').style.display = 'none';
    });
  </script>
</body>
</html>
