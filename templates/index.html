<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonko</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>
        <div class="animation-title">
            <iframe src="nombreyonko.html" style="border:none; width:100%; height:300px;"></iframe>
        </div>
    </h1>

    <div class="social-icons">
        {% if links.youtube %}
        <a href="{{ links.youtube }}" target="_blank"><img src="/static/Capa13.png" alt="YouTube"></a>
        {% endif %}
        {% if links.spotify %}
        <a href="{{ links.spotify }}" target="_blank"><img src="/static/Capa15.png" alt="Spotify"></a>
        {% endif %}
    </div>

    <div class="row">
        <div class="column">
            <div class="animation-character">
                <iframe src="personajepequeño.html" style="border:none; width:100%; height:300px;"></iframe>
            </div>
        </div>
        <div class="column">
            <div class="button">
                <a href="#register">
                    <img src="/static/yonkonews.png" class="default" alt="Animation">
                    <img src="/static/yonkonews2.png" class="hover" alt="Animation Hover">
                </a>
            </div>
            <div class="button">
                <a href="#">
                    <img src="/static/webYonkoshitOption.png" class="default" alt="Storyboard">
                    <img src="/static/webYonkoshitOption2.png" class="hover" alt="Storyboard Hover">
                </a>
            </div>
        </div>
    </div>

    <div id="register">
        <form action="/registrar_email" method="POST">
            <input type="email" name="email" placeholder="Correo electrónico" required>
            <input type="text" name="first_name" placeholder="Nombre" required>
            <select name="art_type" required>
                <option value="" disabled selected>Seleccione su arte</option>
                <option value="Animación">Animación</option>
                <option value="Storyboard">Storyboard</option>
                <option value="Diseño">Diseño</option>
            </select>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
