<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Correo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="bubble">
        <form id="email_signup" action="/registrar_email" method="POST">
            <input type="password" name="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>

            <button type="button" id="join-waitlist-btn">Unirse a la lista de espera</button>
            <span>**Los lanzamientos solo son accesibles con contraseña**</span>
            
            <input type="email" name="email" id="email" placeholder="Correo electrónico" maxlength="256" required>
            <input type="text" name="first_name" id="first_name" placeholder="Nombre" maxlength="256">
            <input type="text" name="last_name" id="last_name" placeholder="Apellido" maxlength="256">
            <button type="submit" id="submit-newsletter">Enviar</button>
        </form>

        <div class="social-icons">
            <a href="https://www.instagram.com/alter_yonko/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@yonkoalter" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://open.spotify.com/playlist/102yCUJEDKujObCziSLvM6?si=o35EB72lTSm_1p80EeU0Dg" target="_blank"><i class="fab fa-spotify"></i></a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#email_signup').submit(function (e) {
            e.preventDefault();

            $.ajax({
                type: 'POST',
                url: '/registrar_email',
                data: $(this).serialize(),
                success: function (response) {
                    alert(response.message);
                    $('#email_signup')[0].reset(); // Resetear el formulario
                },
                error: function () {
                    alert('Hubo un error al registrar el correo. Intenta nuevamente.');
                }
            });
        });
    </script>
</body>
</html>
