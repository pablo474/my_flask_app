<!DOCTYPE html>
<html>
<head>
  <title>Yonko Web</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Título principal -->
  <div class="title-container">
    <img src="/static/images/web-nombre-anim.gif" alt="Nombre Animado" class="title-gif">
  </div>

  <!-- Contenedor principal -->
  <div class="main-container">
    <!-- Animación Diablo -->
    <div class="left-column">
      <img src="/static/images/web-diablo-anim.gif" alt="Diablo Animado" class="diablo-gif">
    </div>

    <!-- Botones -->
    <div class="right-column">
      <div class="button">
        <a href="#" class="button-link">
          <img src="/static/images/yonkonews.png" alt="Animation" class="button-default">
          <img src="/static/images/yonkonews2.png" alt="Animation Hover" class="button-hover">
        </a>
      </div>
      <div class="button">
        <a href="#" class="button-link">
          <img src="/static/images/webYonkoshitOption.png" alt="Storyboard" class="button-default">
          <img src="/static/images/webYonkoshitOption2.png" alt="Storyboard Hover" class="button-hover">
        </a>
      </div>
    </div>
  </div>
</body>
</html>
