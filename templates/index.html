<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="shortcut icon" href="/static/images/favicon.ico">
  <title>Yonko Alter</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Yonko Alter" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/static/images/web-nombre-anim.gif" />
  <meta property="og:description" content="Yonko Alter - Animation and Creativity" />
  <meta name="theme-color" content="#FFD59F">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Fondo -->
  <div class="background"></div>

  <!-- Cabecera -->
  <header>
    <img src="/static/images/web-nombre-anim.gif" alt="Nombre Animado" class="header-title">
  </header>

  <!-- Contenedor principal -->
  <main class="main-container">
    <!-- Personaje a la izquierda -->
    <div class="left-column">
      <img src="/static/images/web-diablo-anim.gif" alt="Diablo Animado" class="diablo-gif">
    </div>

    <!-- Botones a la derecha -->
    <div class="right-column">
      <div class="button">
        <a href="#" class="button-link">
          <img src="/static/images/yonkonews.png" alt="Animation Default" class="button-default">
          <img src="/static/images/yonkonews2.png" alt="Animation Hover" class="img-top">
        </a>
      </div>
      <div class="button">
        <a href="#" class="button-link">
          <img src="/static/images/webYonkoshitOption.png" alt="Storyboard Default" class="button-default">
          <img src="/static/images/webYonkoshitOption2.png" alt="Storyboard Hover" class="img-top">
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <a href="https://www.youtube.com/@yonkoalter/featured" title="YouTube">
      <img src="/static/images/Capa13.png" alt="YouTube">
    </a>
    <a href="#" title="Spotify">
      <img src="/static/images/Capa15.png" alt="Spotify">
    </a>
  </footer>
</body>
</html>
