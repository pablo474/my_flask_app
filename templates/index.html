<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonko Waitlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <video src="{{ url_for('static', filename='Animacioin-intro-devilvinyl_2a-parte.mp4') }}" autoplay muted loop></video>
    
    <div class="bubble">
        <form method="post" action="/subscribe" id="login_form">
            <input type="password" name="password" id="password" placeholder="Password">
            <button type="submit">Enter</button>
        </form>
        <button id="join-waitlist-btn">Join waitlist for password</button>
        <span>**Drops are only accessible with password**</span>
        
        <div class="join-waitlist-div" style="display: none;">
            <form id="email_signup" action="/subscribe" method="POST">
                <input type="email" name="email" placeholder="E-Mail">
                <input type="text" name="first_name" placeholder="First name">
                <input type="text" name="last_name" placeholder="Last name">
                <input type="submit" value="Submit">
            </form>
        </div>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/yonko_alter" target="_blank">Instagram</a>
            <a href="https://www.youtube.com/yonko_alter" target="_blank">YouTube</a>
            <a href="https://open.spotify.com/user/yonko_alter" target="_blank">Spotify</a>
        </div>
    </div>

    <script>
        document.getElementById("join-waitlist-btn").onclick = function () {
            document.querySelector(".join-waitlist-div").style.display = "block";
        };
    </script>
</body>
</html>
