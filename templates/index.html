<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de prueba para el diseño de Yonko">
  <title>Yonko Web</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('/static/images/fondo.png') no-repeat center center fixed;
      background-size: cover;
    }

    /* Cabecera */
    .header {
      text-align: center;
      margin-top: 20px;
    }

    .header img {
      max-width: 80%; /* Tamaño reducido al 80% del original */
      height: auto;
    }

    /* Contenedor principal */
    .content {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    /* Columna izquierda: Personaje */
    .character {
      flex: 1;
      text-align: center;
    }

    .character img {
      width: auto;
      max-height: 600px; /* Mantiene el tamaño original */
      height: auto;
    }

    /* Botones */
    .buttons {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .button {
      position: relative;
    }

    .button img {
      max-width: 600px; /* Tamaño aumentado 3 veces */
      height: auto;
    }

    .button .hover-img {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
    }

    .button:hover img {
      display: none;
    }

    .button:hover .hover-img {
      display: block;
    }

    /* Footer */
    .footer {
      text-align: center;
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    .footer img {
      max-width: 50px;
      margin: 0 10px;
      transition: transform 0.2s ease;
    }

    /* Media Query para móviles */
    @media (max-width: 768px) {
      .header img {
        max-width: 100%; /* Tamaño completo en móviles */
      }

      .character img {
        max-height: 400px; /* Reduce el tamaño del personaje */
      }

      .button img,
      .button .hover-img {
        max-width: 300px; /* Botones más pequeños en móviles */
      }
    }
  </style>
</head>
<body>
  <!-- Cabecera -->
  <div class="header">
    <img src="/static/images/web-nombre-anim.gif" alt="Animación del nombre">
  </div>

  <!-- Contenido central -->
  <div class="content">
    <!-- Personaje a la izquierda -->
    <div class="character">
      <img src="/static/images/web-diablo-anim.gif" alt="Personaje animado">
    </div>

    <!-- Botones en el centro -->
    <div class="buttons">
      <!-- Botón Animation -->
      <div class="button">
        <a href="/animation">
          <img src="/static/images/yonkonews.png" alt="Botón Animation">
          <img class="hover-img" src="/static/images/yonkonews2.png" alt="Botón Animation Hover">
        </a>
      </div>

      <!-- Botón Storyboard -->
      <div class="button">
        <a href="/storyboard">
          <img src="/static/images/webYonkoshitOption.png" alt="Botón Storyboard">
          <img class="hover-img" src="/static/images/webYonkoshitOption2.png" alt="Botón Storyboard Hover">
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://www.youtube.com/@yonkoalter/featured" target="_blank">
      <img src="/static/images/Capa13.png" alt="YouTube">
    </a>
    <a href="#" target="_blank">
      <img src="/static/images/Capa15.png" alt="Spotify">
    </a>
  </div>
</body>
</html>
