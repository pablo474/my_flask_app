<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yonko</title>
  <link rel="stylesheet" href="styles.css"> <!-- Enlaza el CSS externo -->
  <!-- Font Awesome para los iconos de redes sociales -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <!-- Video de fondo -->
  <div class="background-video">
    <video src="Animacioin-intro-devilvinyl_2a-parte.mp4" autoplay muted loop></video>
  </div>

  <!-- Contenido principal -->
  <div class="container">
    <!-- Bocadillo estilo cómic para el formulario de contraseña -->
    <div class="comic-bubble">
      <div class="input-group">
        <input type="password" name="password" id="password" placeholder="Password">
        <button type="button">Enter</button>
      </div>
    </div>

    <!-- Botón de Lista de Espera -->
    <button id="join-waitlist-btn">Join waitlist for password</button>
    <span class="small-password-text">**Drops are only accessible with password**</span>

    <!-- Formulario de Lista de Espera -->
    <div class="join-waitlist-div">
      <form id="email_signup" action="#" method="POST">
        <input type="email" name="email" id="email" placeholder="E-Mail" required>
        <input type="text" name="first_name" id="first_name" placeholder="First name">
        <input type="text" name="last_name" id="last_name" placeholder="Last name">
        <button type="submit">Submit</button>
      </form>
    </div>

    <!-- Iconos de redes sociales -->
    <div class="social-icons">
      <a href="https://www.instagram.com/alter_yonko/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/@yonkoalter" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://open.spotify.com/intl-es/artist/27hGZtnh8GnGI7lc6r6eHN?si=WTJGw5ZYRLuNRj8Z4yL4dg" target="_blank" aria-label="Spotify"><i class="fab fa-spotify"></i></a>
    </div>
  </div>

  <!-- JavaScript para mostrar/ocultar el formulario de lista de espera -->
  <script>
    document.getElementById('join-waitlist-btn').addEventListener('click', function () {
      document.querySelector('.join-waitlist-div').style.display = 'block';
    });
  </script>
</body>
</html>
