<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de prueba para el diseño de Yonko">
  <title>Yonko Web</title>
  <style>
    /* Estilo general */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('/static/images/fondo.png') no-repeat center center fixed;
      background-size: cover;
    }

    /* Cabecera */
    .header {
      width: 100%;
      text-align: center;
      margin: 20px 0;
    }

    .header img {
      width: 100%;
      max-width: 1500px; /* Ancho máximo para evitar que sea demasiado grande */
      height: auto;
    }

    /* Contenedor principal */
    .main-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 80%;
      margin: 40px auto;
    }

    /* Personaje a la izquierda */
    .character {
      flex: 1;
      text-align: center;
    }

    .character img {
      width: auto;
      height: 400px; /* Tamaño del GIF del personaje */
      max-width: 100%;
    }

    /* Botones a la derecha */
    .buttons {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .button {
      position: relative;
    }

    .button img {
      display: block;
      max-width: 200px; /* Tamaño de los botones */
      transition: transform 0.2s ease;
    }

    .button .hover-img {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .button:hover img {
      display: none;
    }

    .button:hover .hover-img {
      display: block;
    }

    /* Footer */
    .footer {
      text-align: center;
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    .footer img {
      max-width: 50px;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <!-- Cabecera -->
  <div class="header">
    <img src="/static/images/web-nombre-anim.gif" alt="Animación del nombre">
  </div>

  <!-- Contenido principal -->
  <div class="main-container">
    <!-- Columna izquierda: Personaje -->
    <div class="character">
      <img src="/static/images/web-diablo-anim.gif" alt="Personaje animado">
    </div>

    <!-- Columna derecha: Botones -->
    <div class="buttons">
      <!-- Botón Animation -->
      <div class="button">
        <a href="/animation">
          <img src="/static/images/yonkonews.png" alt="Botón Animation">
          <img class="hover-img" src="/static/images/yonkonews2.png" alt="Botón Animation Hover">
        </a>
      </div>

      <!-- Botón Storyboard -->
      <div class="button">
        <a href="/storyboard">
          <img src="/static/images/webYonkoshitOption.png" alt="Botón Storyboard">
          <img class="hover-img" src="/static/images/webYonkoshitOption2.png" alt="Botón Storyboard Hover">
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://www.youtube.com/@yonkoalter/featured" target="_blank">
      <img src="/static/images/Capa13.png" alt="YouTube">
    </a>
    <a href="#" target="_blank">
      <img src="/static/images/Capa15.png" alt="Spotify">
    </a>
  </div>
</body>
</html>
